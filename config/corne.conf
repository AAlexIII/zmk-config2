# ==== Минимальный конфиг для стабильного BLE Corne (nice!nano) ====

# Главный фикс соединения для nice!nano
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# Фиксированные настройки BLE для стабильности
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=20
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=40
CONFIG_BT_PERIPHERAL_PREF_LATENCY=0
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=600

# Отключаем запрос пароля для автоматического сопряжения половин
CONFIG_ZMK_BLE_PASSKEY_ENTRY=n
