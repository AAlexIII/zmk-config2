# ==== Настройки для nice!nano (Corne) — Стабильная BLE-связь между половинами ====

# Полностью отключаем глубокий сон, чтобы связь не рвалась
CONFIG_ZMK_SLEEP=n

# Бездействие до мягкого сна (idle) — 5 минут, чтобы не усыплять модуль при наборе
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=300000

# Запрещаем центральной стороне усыплять периферию
# (правая половина всегда будет на связи)
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERAL_SLEEP=n

# *** Ключевой параметр: экспериментальное соединение, решает проблемы со спариванием у nice!nano ***
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# Отключаем запрос pin-кода (мешает автоматическому сопряжению половин)
CONFIG_ZMK_BLE_PASSKEY_ENTRY=n

# Фиксированные интервалы BLE-соединения для максимальной стабильности
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=20
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=40
CONFIG_BT_PERIPHERAL_PREF_LATENCY=0
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=600

# Проксирование заряда батареи правой половины на левую (удобно)
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y

# Отключаем динамическую базу данных GATT (меньше оверхед)
CONFIG_BT_GATT_DYNAMIC_DB=n

# Отключаем логирование USB для экономии ресурсов
CONFIG_ZMK_USB_LOGGING=n
