# === Энергосбережение и сон ===
# Время бездействия перед idle sleep: 60 сек (было 15)
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=60000
# Включить глубокий сон через 15 минут
CONFIG_ZMK_SLEEP=y

# === BLE стабильность (чтобы правая не отваливалась) ===
# Не отключать питание периферии при сне
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
# Увеличить BLE интервал для стабильности
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=80
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=40
CONFIG_BT_PERIPHERAL_PREF_LATENCY=10
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=400

# === Для Mac (иногда помогает с pairing) ===
# Разрешить переподключение без жёсткого контроля подписок
CONFIG_BT_GATT_ENFORCE_SUBSCRIPTION=n

CONFIG_ZMK_USB_LOGGING=y
CONFIG_ZMK_USB=y
